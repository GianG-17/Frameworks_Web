services:
  postgres:
    image: postgres:16-alpine
    container_name: ponto_digital_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Publica a porta no host (container usa 5432 internamente) para acesso
    # externo, ex.: Prisma Studio / npm run dev rodando fora do container.
    ports:
      - '${POSTGRES_PORT:-5433}:5433'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ponto_digital_app
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Montada a partir das credenciais do Postgres; usa o host interno da rede.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      NODE_ENV: production
      PORT: ${PORT:-3050}
      # Domínio público em produção (ex.: https://seu-dominio.com). Opcional aqui:
      # o app usa fetch JSON, que não dispara o CSRF do adapter-node.
      ORIGIN: ${ORIGIN:-http://localhost:3050}
      # Segredo de assinatura dos tokens JWT. Defina um valor forte em produção.
      JWT_SECRET: ${JWT_SECRET:-segredo}
    ports:
      - '${PORT:-3050}:${PORT:-3050}'

volumes:
  postgres_data:
