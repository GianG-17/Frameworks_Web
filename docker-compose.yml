services:
  postgres:
    image: postgres:16-alpine
    container_name: ponto_digital_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ponto_digital_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Dentro da rede do Compose o host do banco é o serviço "postgres" (não localhost).
      # Montado a partir das credenciais, para o .env poder usar localhost no dev da máquina.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      PORT: ${PORT}
      ORIGIN: ${ORIGIN}
    ports:
      - "${PORT}:${PORT}"

volumes:
  postgres_data: